<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KZF Legal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>

    <!-- LOGIN PAGE (will be shown first if not authenticated)-->
   <div id="page-login" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3L4 7v5c0 5 3.5 9.7 8 11 4.5-1.3 8-6 8-11V7L12 3z"/>
        </svg>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account</p>
 
      <div id="login-error" class="form-error hidden">Incorrect email or password. Please try again.</div>
 
      <div class="form-group">
        <label class="form-label" for="login-email">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input class="form-input" type="password" id="login-password" placeholder="Enter Password" autocomplete="current-password" />
      </div>
 
      <button class="btn-primary" id="btn-login">Sign in</button>
 
      <div class="auth-links">
        <a href="#" class="auth-link" id="link-forgot">Forgot password?</a>
        <div class="auth-divider"><span>or</span></div>
        <p class="auth-switch">Don't have an account? <a href="#" class="auth-link" id="link-to-register">Register</a></p>
      </div>
    </div>
   </div>

    <main class="app">
      <h1>KZF Legal</h1>
      <p>Basic client scaffold ready.</p>
    </main>

    <!-- notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="./js/socket.js"></script>
    <script src="./js/upload.js"></script>
    <script src="./js/chat.js"></script>
  </body>
</html>
